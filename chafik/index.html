<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نادي الروبوتيك</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-image: url("a.png");
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .custom-ticker {
      width: 90%;
      max-width: 800px;
      margin: 40px auto 40px auto; 
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      overflow: hidden;
      border-radius: 10px;
      padding: 10px 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      direction: rtl;
    }
    .custom-ticker-content {
      display: inline-block;
      white-space: nowrap;
      padding-left: 100%;
      animation: scroll-left 15s linear infinite;
    }
    @keyframes scroll-left {
      0% {
        transform: translateX(0%);
      }
      100% {
        transform: translateX(-100%);
      }
    }
    .buttons-container {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      width: 90%;
      max-width: 800px;
    }
    .robotic-button {
      background-color: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s, background-color 0.3s;
      text-decoration: none;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: bold;
    }
    .robotic-button:hover {
      transform: scale(1.05);
      background-color: rgba(255, 255, 255, 0.8);
    }
    .robotic-button svg {
      width: 40px;
      height: 40px;
      margin-bottom: 10px;
      fill: #0022aa;
    }
    .floating-button {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background-color: #00aaff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      transition: background-color 0.3s ease;
    }
    .floating-button:hover {
      background-color: #0088cc;
    }
    #a{ 
      width: 200px;
      height: 100px;
    }
  </style>
</head>
<body>
  <center><img src="ج.png" alt="" id="a"></center>
  <div class="custom-ticker">
    <div class="custom-ticker-content">
ستاد خصنة نربحو العام جيا إنشاء الله 💪 واش متفقين؟
    </div>
  </div>
  <div class="buttons-container">
    <a href="أنشطة النادي العلمي والتكنولوجي.html" class="robotic-button">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm4 0h14v-2H7v2zm0 4h14v-2H7v2zM3 17h2v-2H3v2zM3 9h2V7H3v2zm4 0h14V7H7v2z"/></svg>
      نادي علمي وتكنولوجي
    </a>
    <a href="ورشات الروبوتيك والمعلوميات بمؤسسة تفتح الفني بتازة خطوة نحو الابتكار والتكنولوجيا" class="robotic-button">
      <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H7v4H4l8 8 8-8zM4 18v2h16v-2H4z"/></svg>
      الورشات
    </a>
    <a href="تصميم موقع إلكتروني خاص بمؤسسة تفتح الفني بتازة مبادرة رقمية من إبداع تلميذي" class="robotic-button">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      أنشطة موازية
    </a>
    <a href="مشاريع تقنية مبتكرة في الروبوتيك والمعلوميات بمؤسسة تفتح الفني بتازة" class="robotic-button">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm-8 8v-1c0-2.21 3.58-4 8-4s8 1.79 8 4v1H4z"/></svg>
      أعمال خاصة
    </a>
    <a href="ورشات الروبوتيك والمعلوميات بمؤسسة تفتح الفني بتازة خطوة نحو الابتكار والتكنولوجيا" class="robotic-button">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      مشاريع تقنية
    </a>
  </div>
</body>
</html>
