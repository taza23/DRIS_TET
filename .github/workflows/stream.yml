name: 🚀 FB Multi Stream PRO MAX

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true

      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true

      WATERMARK_TEXT:
        description: 'نص العلامة المائية'
        required: true
        default: 'CHAFIK GHADDAR TV'

jobs:
  multi-broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: ⚡ Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Start Multi Streaming (Unlimited Streams)
        shell: bash
        run: |
          echo "=============================="
          echo "🚀 STARTING MULTI STREAM..."
          echo "=============================="

          # تحويل القوائم إلى Arrays
          IFS=',' read -ra SOURCES <<< "${{ github.event.inputs.SOURCE_LINKS }}"
          IFS=',' read -ra KEYS <<< "${{ github.event.inputs.FB_STREAM_KEYS }}"

          COUNT_SOURCES=${#SOURCES[@]}
          COUNT_KEYS=${#KEYS[@]}

          # التحقق من التساوي
          if [ "$COUNT_SOURCES" -ne "$COUNT_KEYS" ]; then
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي"
            exit 1
          fi

          # رفع الحد الأقصى للعمليات
          ulimit -u 4096
          ulimit -n 100000

          # تشغيل كل بث في Process مستقل
          for (( i=0; i<$COUNT_SOURCES; i++ ))
          do
            SOURCE=$(echo "${SOURCES[$i]}" | xargs)
            KEY=$(echo "${KEYS[$i]}" | xargs)

            echo "▶️ Launch Stream $((i+1))"

            nohup ffmpeg \
              -hide_banner \
              -loglevel warning \
              -reconnect 1 \
              -reconnect_streamed 1 \
              -reconnect_delay_max 10 \
              -thread_queue_size 8192 \
              -i "$SOURCE" \
              -vf "drawtext=text='${{ github.event.inputs.WATERMARK_TEXT }}':fontcolor=white:fontsize=36:borderw=2:bordercolor=black:box=1:boxcolor=black@0.4:x=w-mod(t*100\,w+tw):y=h-th-25" \
              -map 0:v:0 \
              -map 0:a? \
              -c:v libx264 \
              -preset veryfast \
              -tune zerolatency \
              -pix_fmt yuv420p \
              -profile:v main \
              -r 30 \
              -g 60 \
              -keyint_min 60 \
              -sc_threshold 0 \
              -b:v 3000k \
              -maxrate 3000k \
              -bufsize 6000k \
              -c:a aac \
              -b:a 128k \
              -ar 44100 \
              -f flv \
              "rtmps://live-api-s.facebook.com:443/rtmp/$KEY" \
              > stream_$i.log 2>&1 &

            echo "✅ Stream $((i+1)) Started"
          done

          echo "=============================="
          echo "🔥 ALL STREAMS RUNNING"
          echo "=============================="

          # منع انتهاء الـ runner
          tail -f /dev/null
