name: 🚀 FB Multi Stream MATRIX PRO MAX

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true
      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true
      WATERMARK_TEXT:
        description: 'نص العلامة المائية'
        required: true
        default: 'CHAFIK GHADDAR TV'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 🧩 Generate Dynamic Matrix
        id: set-matrix
        shell: bash
        run: |
          IFS=',' read -ra SOURCES <<< "${{ github.event.inputs.SOURCE_LINKS }}"
          IFS=',' read -ra KEYS <<< "${{ github.event.inputs.FB_STREAM_KEYS }}"
          
          if [ "${#SOURCES[@]}" -ne "${#KEYS[@]}" ]; then
            echo "❌ عدد الروابط وعدد المفاتيح غير متساوي!"
            exit 1
          fi
          
          JSON="["
          for (( i=0; i<${#SOURCES[@]}; i++ ))
          do
            SRC=$(echo "${SOURCES[$i]}" | xargs)
            KEY=$(echo "${KEYS[$i]}" | xargs)
            IDX=$((i+1))
            JSON="$JSON{\"source\":\"$SRC\",\"key\":\"$KEY\",\"index\":$IDX}"
            if [ $i -lt $(( ${#SOURCES[@]} - 1 )) ]; then
              JSON="$JSON,"
            fi
          done
          JSON="$JSON]"
          
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  stream:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # إيلا طاح شي لايف لسبب ما.. اللايفات لخرين كايبقاو خدامين ومكايحبسوش!
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - name: ⚡ Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🎥 Launch Dedicated Stream ${{ matrix.index }}
        run: |
          echo "========================================="
          echo "🎬 STARTING STREAM RUNNER NUMBER: ${{ matrix.index }}"
          echo "🎯 TARGET KEY: ...${{ matrix.key }}"
          echo "========================================="
          
          ffmpeg \
          -hide_banner \
          -reconnect 1 \
          -reconnect_streamed 1 \
          -reconnect_delay_max 10 \
          -thread_queue_size 4096 \
          -i "${{ matrix.matrix.source }}" \
          -vf "drawtext=text='${{ github.event.inputs.WATERMARK_TEXT }}':fontcolor=white:fontsize=36:borderw=2:bordercolor=black:box=1:boxcolor=black@0.4:x=w-mod(t*100\,w+tw):y=h-th-25" \
          -map 0:v:0 \
          -map 0:a? \
          -c:v libx264 \
          -preset veryfast \
          -tune zerolatency \
          -pix_fmt yuv420p \
          -profile:v main \
          -r 30 \
          -g 60 \
          -keyint_min 60 \
          -sc_threshold 0 \
          -b:v 3000k \
          -maxrate 3000k \
          -bufsize 6000k \
          -c:a aac \
          -b:a 128k \
          -ar 44100 \
          -f flv \
          "rtmps://live-api-s.facebook.com:443/rtmp/${{ matrix.key }}"
          
