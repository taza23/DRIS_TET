name: 🚀 Multi-Stream Ultra Engine (Instant Launch Edition)
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 روابط البث (فرق بيناتهم بـ فاصلة ,)'
        required: true
        type: string
      fb_keys:
        description: '🔑 مفاتيح البث (بينامتهم فاصلة بنفس الترتيب)'
        required: true
        type: string
      tg_bot_token:
        description: '🤖 Token ديال بوت تلغرام'
        required: true
        type: string
      tg_chat_id:
        description: '🆔 الـ Chat ID ديالك ف تلغرام للتحكم'
        required: true
        type: string
      ad_video_url:
        description: '📹 رابط فيديو الإعلان (mp4 مباشر)'
        required: false
        default: 'https://html5demos.com/assets/dizzy.mp4'
        type: string
      resolution:
        description: '📺 الجودة'
        required: true
        type: choice
        options:
          - '1280:720'
          - '1920:1080'
        default: '1280:720'
      fps:
        description: '🎞️ FPS'
        required: true
        default: '30'
        type: choice
        options:
          - '30'
          - '60'
      overlay_text:
        description: '📸 نص الإعلان المتحرك (لتحت)'
        required: false
        default: '🔥 لمشاهدة بدون تقطيع وبجودة عالية.. حملوا تطبيق CHAFIK GHADDAR TV الآن! 🔥      🔥 لمشاهدة بدون تقطيع وبجودة عالية.. حملوا تطبيق CHAFIK GHADDAR TV الآن! 🔥'
        type: string

jobs:
  broadcasting:
    name: 📡 Streaming Processing
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Install Power Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq streamlink
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 🚀 Launch Multi-Streams & Telegram Bot
        env:
          URLS: ${{ inputs.video_urls }}
          KEYS: ${{ inputs.fb_keys }}
          TG_TOKEN: ${{ inputs.tg_bot_token }}
          TG_CHAT: ${{ inputs.tg_chat_id }}
          AD_URL: ${{ inputs.ad_video_url }}
          RES: ${{ inputs.resolution }}
          FPS: ${{ inputs.fps }}
          WATERMARK_TEXT: ${{ inputs.overlay_text }}
        run: |
          IFS=',' read -r -a url_array <<< "$URLS"
          IFS=',' read -r -a key_array <<< "$KEYS"

          if [ "$RES" == "1920:1080" ]; then
            BITRATE="4500k"
          else
            BITRATE="2500k"
          fi

          BRAND_LOGO="https://files.catbox.moe/7t5k1y.webp"
          COVERUP_LOGO="https://files.catbox.moe/ii06qt.png"

          # 1. إعداد الأنابيب الثابتة وتجهيز البث الرئيسي لفيسبوك (بدون -re لتفادي التعطال)
          for i in "${!url_array[@]}"; do
            pipe="/tmp/stream_pipe_${i}"
            rm -f "$pipe"
            mkfifo "$pipe"
            
            sleep infinity > "$pipe" &

            # تسريع التحليل والاستجابة الفورية لفيسبوك
            ffmpeg -hide_banner -loglevel error -probesize 1M -analyzeduration 1M -i "$pipe" \
              -i "$BRAND_LOGO" \
              -i "$COVERUP_LOGO" \
              -filter_complex \
                "[0:v]scale=${RES}[base]; \
                 [base]drawtext=text='${WATERMARK_TEXT}':x=w-mod(t*140\,w+tw):y=h-th-25:fontcolor=yellow:fontsize=26:box=1:boxcolor=black@0.7:boxborderw=8[base_with_text]; \
                 [1:v]scale=-1:65[scaled_logo1]; \
                 [base_with_text][scaled_logo1]overlay=w-W-30:25[base_with_brand]; \
                 [2:v]scale=-1:90[scaled_logo2]; \
                 [base_with_brand][scaled_logo2]overlay=35:h-H-45[final_video]" \
              -map "[final_video]" -map 0:a? \
              -c:v libx264 -preset veryfast -tune zerolatency -b:v $BITRATE -maxrate $BITRATE -bufsize ${BITRATE//k/}k \
              -g $(( FPS * 2 )) -keyint_min $(( FPS * 2 )) -sc_threshold 0 -c:a aac -b:a 128k -ar 44100 \
              -f flv -flvflags no_duration_filesize "rtmps://live-api-s.facebook.com:443/rtmp/${key_array[$i]}" &
          done

          # 2. وظائف التبديل عبر تلغرام (الـ Feeder هو لي فيه -re فقط)
          kill_feeders() {
            pkill -f "yt-dlp" || true
            pkill -f "ffmpeg.*pipe" || true
          }

          start_match() {
            kill_feeders
            for i in "${!url_array[@]}"; do
              local stream_url="${url_array[$i]}"
              local pipe="/tmp/stream_pipe_${i}"
              (
                real_url=$(yt-dlp -g "$stream_url" --error-location --no-warnings 2>/dev/null || echo "$stream_url")
                ffmpeg -loglevel error -re -i "$real_url" -c copy -f mpegts -y "$pipe" > /dev/null 2>&1
              ) &
            done
            curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d "chat_id=${TG_CHAT}&text=⚽ تم تشغيل بث المباراة بنجاح على CHAFIK GHADDAR TV!"
          }

          start_ads() {
            kill_feeders
            for i in "${!url_array[@]}"; do
              local pipe="/tmp/stream_pipe_${i}"
              ffmpeg -loglevel error -re -stream_loop -1 -i "$AD_URL" -c copy -f mpegts -y "$pipe" > /dev/null 2>&1 &
            done
            curl -s "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d "chat_id=${TG_CHAT}&text=📺 تم تحويل البث للإعلانات بنجاح!"
          }

          start_match

          # 3. حلقة البوت للاستماع للأوامر
          LAST_UPDATE_ID=0
          while true; do
            UPDATES=$(curl -s "https://api.telegram.org/bot${TG_TOKEN}/getUpdates?offset=${LAST_UPDATE_ID}&timeout=15")
            COMMAND=$(echo "$UPDATES" | jq -r '.result[-1].message.text')
            CHAT_FROM=$(echo "$UPDATES" | jq -r '.result[-1].message.chat.id')
            NEW_UPDATE_ID=$(echo "$UPDATES" | jq -r '.result[-1].update_id')

            if [ "$NEW_UPDATE_ID" != "null" ] && [ "$NEW_UPDATE_ID" -gt "$LAST_UPDATE_ID" ]; then
              LAST_UPDATE_ID=$((NEW_UPDATE_ID + 1))
              if [ "$CHAT_FROM" == "$TG_CHAT" ]; then
                if [ "$COMMAND" == "/match" ]; then
                  start_match
                elif [ "$COMMAND" == "/ads" ]; then
                  start_ads
                fi
              fi
            fi
            sleep 1
          done
