name: 🚀 Multi-Stream Ultra Engine PRO
on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 روابط البث (فرق بيناتهم بـ فاصلة ,)'
        required: true
        type: string
      fb_keys:
        description: '🔑 مفاتيح البث (حتى هما فرق بيناتهم بـ فاصلة بنفس ترتيب الروابط)'
        required: true
        type: string
      resolution:
        description: '📺 الجودة'
        required: true
        type: choice
        options:
          - '1280:720'
          - '1920:1080'
        default: '1280:720'
      fps:
        description: '🎞️ FPS'
        required: true
        default: '30'
        type: choice
        options:
          - '30'
          - '60'
      overlay_text:
        description: '📸 نص العلامة المائية'
        required: false
        default: 'FOOT LIVE PRO - CHAFIK GHADDAR'
        type: string

jobs:
  broadcasting:
    name: 📡 Streaming Processing
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Install Power Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq streamlink
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 🚀 Launch Multi-Streams
        env:
          URLS: ${{ inputs.video_urls }}
          KEYS: ${{ inputs.fb_keys }}
          RES: ${{ inputs.resolution }}
          FPS: ${{ inputs.fps }}
          WATERMARK: ${{ inputs.overlay_text }}
        run: |
          IFS=',' read -r -a url_array <<< "$URLS"
          IFS=',' read -r -a key_array <<< "$KEYS"

          if [ "$RES" == "1920:1080" ]; then
            BITRATE="4500k"
          else
            BITRATE="2500k"
          fi

          echo "🚀 Starting streams..."

          start_stream() {
            local stream_url=$1
            local fb_key=$2
            local id=$3

            echo "🎬 Processing Stream #$id..."
            
            real_url=$(yt-dlp -g "$stream_url" --error-location --no-warnings 2>/dev/null || echo "$stream_url")

            # تم إضافة إعدادات Zero-Latency والشريط المتحرك هنا
            ffmpeg -hide_banner -loglevel error \
              -analyzeduration 0 -probesize 2048 -fflags nobuffer -flags low_delay \
              -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -re -i "$real_url" \
              -vf "scale=${RES},drawtext=text='${WATERMARK}':x=w-mod(t*150\,w+tw):y=h-th-20:fontsize=35:fontcolor=white@0.9:box=1:boxcolor=black@0.5:boxborderw=5" \
              -c:v libx264 -preset ultrafast -tune zerolatency \
              -b:v $BITRATE -maxrate $BITRATE -bufsize $BITRATE \
              -g $(( FPS * 2 )) -c:a aac -b:a 128k -ar 44100 \
              -f flv "rtmps://live-api-s.facebook.com:443/rtmp/${fb_key}" &
          }

          for i in "${!url_array[@]}"; do
            start_stream "${url_array[$i]}" "${key_array[$i]}" "$i"
          done

          echo "✅ All streams are running in parallel with Zero-Latency."
          wait
