name: 🚀 FB Multi Stream PRO MAX ULTRA 20+

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINKS:
        description: 'روابط البث - فرق بينهم بـ ,'
        required: true

      FB_STREAM_KEYS:
        description: 'مفاتيح البث - فرق بينهم بـ ,'
        required: true

jobs:
  ultra-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: ⚡ Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: 🚀 Start Ultra Streams
        shell: bash
        run: |

          echo "===================================="
          echo "🚀 STARTING 20+ STREAM ENGINE"
          echo "===================================="

          mkdir -p logs

          IFS=',' read -ra SOURCES <<< "${{ github.event.inputs.SOURCE_LINKS }}"
          IFS=',' read -ra KEYS <<< "${{ github.event.inputs.FB_STREAM_KEYS }}"

          TOTAL_SOURCES=${#SOURCES[@]}
          TOTAL_KEYS=${#KEYS[@]}

          if [ "$TOTAL_SOURCES" -ne "$TOTAL_KEYS" ]; then
            echo "❌ SOURCES COUNT != KEYS COUNT"
            exit 1
          fi

          for (( i=0; i<$TOTAL_SOURCES; i++ ))
          do

            SOURCE=$(echo "${SOURCES[$i]}" | xargs)
            KEY=$(echo "${KEYS[$i]}" | xargs)

            echo "▶️ Launching Stream $((i+1))"

            (
              while true
              do

                ffmpeg \
                -hide_banner \
                -nostats \
                -loglevel warning \
                -fflags +genpts+discardcorrupt \
                -flags low_delay \
                -strict experimental \
                -err_detect ignore_err \
                -reconnect 1 \
                -reconnect_streamed 1 \
                -reconnect_at_eof 1 \
                -reconnect_delay_max 10 \
                -rw_timeout 15000000 \
                -thread_queue_size 8192 \
                -threads 1 \
                -i "$SOURCE" \
                -map 0:v:0 \
                -map 0:a? \
                -c:v copy \
                -c:a copy \
                -f flv \
                "rtmps://live-api-s.facebook.com:443/rtmp/$KEY"

                echo "⚠️ Stream $((i+1)) Restarting..."

                sleep 5

              done
            ) > logs/stream_$i.log 2>&1 &

            sleep 1

          done

          echo "===================================="
          echo "🔥 ALL STREAMS STARTED"
          echo "===================================="

          while true
          do
            sleep 60
          done
