name: FB Live Stream PRO

on:
  workflow_dispatch:
    inputs:
      SOURCE_LINK:
        description: 'رابط البث الأصلي (M3U8 أو فيديو)'
        required: true
      FB_STREAM_KEY:
        description: 'مفتاح بث فيسبوك (Stream Key فقط)'
        required: true
      WATERMARK_TEXT:
        description: 'نص العلامة المائية'
        required: true
        default: 'CHAFIK GHADDAR TV'

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Set up FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: Start Broadcast to Facebook Live
        run: |
          echo "Starting the stream..."
          ffmpeg -hide_banner -loglevel warning \
          -thread_queue_size 1024 -i "${{ github.event.inputs.SOURCE_LINK }}" \
          -vf "drawtext=text='${{ github.event.inputs.WATERMARK_TEXT }}':fontcolor=white:fontsize=35:box=1:boxcolor=black@0.5:x=w-mod(t*120\,w+text_w):y=h-th-30" \
          -c:v libx264 -preset veryfast -profile:v main -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmps://live-api-s.facebook.com:443/rtmp/${{ github.event.inputs.FB_STREAM_KEY }}"
          
