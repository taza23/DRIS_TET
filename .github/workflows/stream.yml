name: AUTO_RESTART_STREAM
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'رابط m3u8'
        required: true
      fb_key:
        description: 'Stream Key'
        required: true

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg & Fonts
        run: sudo apt update && sudo apt install ffmpeg fonts-freefont-ttf -y

      - name: Infinite Stream Loop
        run: |
          echo "🚀 بدات عملية البث الذكية مع النص المتحرك (بدون لوجو)..."
          
          while true; do
            echo "🎬 طلاق البث دابا..."
            
            ffmpeg -re -i "${{ github.event.inputs.video_url }}" \
            -vf "drawtext=fontfile=/usr/share/fonts/truetype/freefont/FreeSansBold.ttf:text='   FOOT LIVE   ':fontcolor=white:fontsize=45:x=W-mod(t*150\,W+tw):y=H-th-20:shadowcolor=black:shadowx=2:shadowy=2" \
            -c:v libx264 -preset superfast -b:v 2500k \
            -c:a aac -ar 44100 -f flv \
            "rtmps://live-api-s.facebook.com:443/rtmp/${{ github.event.inputs.fb_key }}"
            
            echo "⚠️ البث طاح! غنعاود نطلقو بعد 5 ثواني..."
            sleep 5
          done
