Name: 🚀 Multi-Stream Ultra Engine PRO

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 روابط البث (فرق بينهم بـ ,)'
        required: true
        type: string

      fb_keys:
        description: '🔑 مفاتيح البث (بنفس ترتيب الروابط)'
        required: true
        type: string

      resolution:
        description: '📺 الجودة'
        required: true
        type: choice
        default: '1280:720'
        options:
          - '1280:720'
          - '1920:1080'

      fps:
        description: '🎞️ FPS'
        required: true
        default: '30'
        type: choice
        options:
          - '30'
          - '60'

      overlay_text:
        description: '📸 النص المتحرك'
        required: false
        default: 'CHAFIK GHADDAR TV'
        type: string

jobs:
  broadcasting:
    name: 📡 Ultra Streaming Engine
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl jq streamlink
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 🚀 Start Streams
        env:
          URLS: ${{ inputs.video_urls }}
          KEYS: ${{ inputs.fb_keys }}
          RES: ${{ inputs.resolution }}
          FPS: ${{ inputs.fps }}
          WATERMARK_TEXT: ${{ inputs.overlay_text }}

        run: |
          IFS=',' read -r -a url_array <<< "$URLS"
          IFS=',' read -r -a key_array <<< "$KEYS"

          # ضبط تلقائي لمعدل البث وحجم البافر لمنع التعثر والتنغيم
          if [ "$RES" == "1920:1080" ]; then
            BITRATE="4000k"
            BUFSIZE="8000k"
          else
            BITRATE="2200k"
            BUFSIZE="4400k"
          fi

          echo "🚀 Starting Stable Ultra Streams..."

          start_stream() {
            local stream_url=$1
            local fb_key=$2
            local id=$3

            echo "🎬 Stream #$id Starting..."

            # استخراج الرابط مع تفعيل الفلاتر لضمان الثبات
            real_url=$(yt-dlp -g "$stream_url" --no-warnings 2>/dev/null || echo "$stream_url")

            # حلقة تكرار ذكية: إذا سقط البث يعيد تشغيله تلقائياً بدون توقف الوظيفة كاملة
            while true; do
              echo "🔄 Executing ffmpeg for Stream #$id..."
              
              ffmpeg \
                -hide_banner \
                -loglevel warning \
                -reconnect 1 \
                -reconnect_at_eof 1 \
                -reconnect_streamed 1 \
                -reconnect_delay_max 5 \
                -rw_timeout 10000000 \
                -thread_queue_size 8192 \
                -fflags +genpts+async+nobuffer \
                -i "$real_url" \
                -filter_complex "\
                [0:v]scale=${RES}:force_original_aspect_ratio=decrease,\
                pad=${RES}:(ow-iw)/2:(oh-ih)/2[base]; \
                [base]drawtext=\
                text='${WATERMARK_TEXT}':\
                fontsize=28:\
                fontcolor=white@0.90:\
                borderw=2:\
                bordercolor=black@0.6:\
                x=w-mod(t*220\\,w+tw):\
                y=h-th-25[final]" \
                -map "[final]" \
                -map 0:a? \
                -c:v libx264 \
                -preset superfast \
                -tune zerolatency \
                -pix_fmt yuv420p \
                -r $FPS \
                -g $((FPS * 2)) \
                -keyint_min $FPS \
                -sc_threshold 0 \
                -b:v $BITRATE \
                -maxrate $BITRATE \
                -bufsize $BUFSIZE \
                -c:a aac \
                -b:a 128k \
                -ar 44100 \
                -flvflags no_duration_filesize \
                -f flv \
                "rtmps://live-api-s.facebook.com:443/rtmp/${fb_key}"

              echo "⚠️ Stream #$id disconnected. Reconnecting in 3 seconds..."
              sleep 3
            done &
          }

          # تشغيل البثوث بالتوازي
          for i in "${!url_array[@]}"; do
            start_stream "${url_array[$i]}" "${key_array[$i]}" "$i"
            sleep 2 # تأخير بسيط بين إطلاق البث والآخر لتفادي ضغط المعالج دفعة واحدة
          done

          echo "✅ جميع البثوث مستقرة وشغالة بدون شعارات"
          wait
          
