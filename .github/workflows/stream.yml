name: 🚀 ALFA TECH Ultra-Fast Stream Engine
on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 الرابط الأساسي (MPD, M3U8, YouTube, Web)'
        required: true
        type: string
      fb_key:
        description: '🔑 مفتاح بث Facebook'
        required: true
        type: string
      logo_url:
        description: '🖼️ رابط لوغو (PNG شفاف) - اختياري'
        required: false
        type: string
      resolution:
        description: '📺 الجودة'
        required: true
        type: choice
        options: [ '1280:720', '1920:1080' ]
        default: '1280:720'
      bitrate:
        description: '📡 البت ريت (يفضل 2500k لـ 720p)'
        required: true
        default: '2500k'
        type: string
      overlay_text:
        description: '💬 النص المتحرك'
        required: false
        default: 'LIVE STREAMING - ALFA TECH'
        type: string

jobs:
  stream:
    name: 🚀 Streaming in Progress...
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Optimization & Setup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg python3-pip streamlink
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 🔴 Start Ultra-Fast Engine
        env:
          PRIMARY_URL: ${{ inputs.video_url }}
          FB_KEY: ${{ inputs.fb_key }}
          LOGO: ${{ inputs.logo_url }}
          RES: ${{ inputs.resolution }}
          BITRATE: ${{ inputs.bitrate }}
          TEXT_VAL: ${{ inputs.overlay_text }}
        run: |
          echo "🚀 Initializing Engine..."
          
          # جلب الرابط بسرعة قصوى
          get_fast_url() {
            local url=$1
            if [[ "$url" == *".mpd"* ]] || [[ "$url" == *".m3u8"* ]]; then
              echo "$url"
            else
              # استخدام yt-dlp مع براميترات السرعة
              yt-dlp -g --format "best" --no-playlist --quiet "$url" || echo "$url"
            fi
          }

          # إعدادات الفلاتر (نص + لوغو + جودة)
          # [0:v] هو الفيديو، [1:v] هو اللوغو
          if [ -n "$LOGO" ]; then
            LOGO_INPUT="-i \"$LOGO\""
            FILTER="[0:v]scale=${RES}[base];[1:v]scale=120:-1[logo];[base][logo]overlay=W-w-20:20,drawtext=text='${TEXT_VAL}':fontcolor=white:fontsize=24:x=w-mod(t*100\,w+tw):y=h-40:box=1:boxcolor=black@0.5[v_out]"
          else
            LOGO_INPUT=""
            FILTER="scale=${RES},drawtext=text='${TEXT_VAL}':fontcolor=white:fontsize=24:x=w-mod(t*100\,w+tw):y=h-40:box=1:boxcolor=black@0.5[v_out]"
          fi

          FB_RTMP="rtmps://live-api-s.facebook.com:443/rtmp/${FB_KEY}"

          while true; do
            REAL_URL=$(get_fast_url "$PRIMARY_URL")
            echo "🎯 Stream Target Acquired: $REAL_URL"

            ffmpeg -hide_banner -loglevel error \
              -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
              -probesize 1M -analyzeduration 1M \
              -i "$REAL_URL" $LOGO_INPUT \
              -filter_complex "$FILTER" \
              -map "[v_out]" -map "0:a" \
              -c:v libx264 -preset superfast -tune zerolatency -pix_fmt yuv420p \
              -b:v $BITRATE -maxrate $BITRATE -bufsize $(( ${BITRATE//k/} * 2 ))k \
              -g 60 -c:a aac -b:a 128k -ar 44100 \
              -f flv "$FB_RTMP"

            echo "⚠️ Stream interrupted! Reconnecting in 2s..."
            sleep 2
          done
          
